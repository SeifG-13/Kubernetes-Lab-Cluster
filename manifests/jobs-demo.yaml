---
# Job: runs to completion, not restarted like a Deployment
# completions: how many successful pod completions needed
# parallelism: how many pods run at once
apiVersion: batch/v1
kind: Job
metadata:
  name: pi-calculator
spec:
  completions: 3        # need 3 successful completions total
  parallelism: 2        # run 2 pods at a time
  backoffLimit: 4       # retry up to 4 times on failure before Job fails
  template:
    spec:
      restartPolicy: Never   # Job pods must be Never or OnFailure (not Always)
      containers:
        - name: pi
          image: perl:5.34-slim
          command: ["perl", "-Mbignum=bpi", "-wle", "print bpi(100)"]

---
# CronJob: creates a Job on a schedule
# Schedule uses standard cron syntax: minute hour day month weekday
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello-cron
spec:
  schedule: "*/1 * * * *"          # every 1 minute
  concurrencyPolicy: Forbid         # don't start new Job if previous still running
  successfulJobsHistoryLimit: 3     # keep last 3 completed jobs
  failedJobsHistoryLimit: 1         # keep last 1 failed job
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: hello
              image: busybox:1.36
              command: ["sh", "-c", "echo Job ran at $(date)"]
