---
# Headless Service — required for StatefulSet DNS
# ClusterIP: None means no virtual IP; DNS returns pod IPs directly
# Each pod gets: <pod>.<svc>.<namespace>.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: default
spec:
  clusterIP: None          # headless — DNS only, no load balancing
  selector:
    app: stateful-web
  ports:
    - port: 80
      name: web

---
# NodePort so we can curl from the host
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: default
spec:
  type: NodePort
  selector:
    app: stateful-web
  ports:
    - port: 80
      nodePort: 30090
      name: web

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: web
  namespace: default
spec:
  serviceName: "web"        # must match the headless Service name
  replicas: 3
  selector:
    matchLabels:
      app: stateful-web
  template:
    metadata:
      labels:
        app: stateful-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /usr/share/nginx/html
          # Each pod writes its own name to index.html on startup
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - echo "<h1>Hello from $(hostname)</h1>" > /usr/share/nginx/html/index.html
  # volumeClaimTemplates: one PVC per pod, created automatically
  # web-data-web-0, web-data-web-1, web-data-web-2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Mi
