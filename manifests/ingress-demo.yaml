apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-blue
  template:
    metadata:
      labels:
        app: app-blue
    spec:
      containers:
      - name: app
        image: hashicorp/http-echo
        args: ["-text=BLUE APP response"]
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app-blue
spec:
  selector:
    app: app-blue
  ports:
  - port: 80
    targetPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-green
  template:
    metadata:
      labels:
        app: app-green
    spec:
      containers:
      - name: app
        image: hashicorp/http-echo
        args: ["-text=GREEN APP response"]
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app-green
spec:
  selector:
    app: app-green
  ports:
  - port: 80
    targetPort: 5678
---
# Path-based routing: /blue → app-blue, /green → app-green
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: demo.local
    http:
      paths:
      - path: /blue
        pathType: Prefix
        backend:
          service:
            name: app-blue
            port:
              number: 80
      - path: /green
        pathType: Prefix
        backend:
          service:
            name: app-green
            port:
              number: 80
