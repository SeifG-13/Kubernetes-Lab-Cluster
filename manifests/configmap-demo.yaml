apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: production
  APP_PORT: "8080"
  config.properties: |
    log.level=info
    max.connections=100
    timeout=30s
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DB_PASSWORD: "supersecret123"
  API_KEY: "abc-def-ghi"
---
apiVersion: v1
kind: Pod
metadata:
  name: config-demo
spec:
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "echo ENV=$APP_ENV PORT=$APP_PORT PASS=$DB_PASSWORD; cat /etc/config/config.properties; sleep 3600"]
    env:
    - name: APP_ENV          # env var from ConfigMap key
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_ENV
    - name: APP_PORT
      valueFrom:
        configMapKeyRef:
          name: app-config
          key: APP_PORT
    - name: DB_PASSWORD      # env var from Secret key
      valueFrom:
        secretKeyRef:
          name: app-secret
          key: DB_PASSWORD
    volumeMounts:
    - name: config-vol
      mountPath: /etc/config  # config.properties appears as a file here
  volumes:
  - name: config-vol
    configMap:
      name: app-config
      items:
      - key: config.properties
        path: config.properties
