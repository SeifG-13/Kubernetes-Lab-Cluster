---
# 02-containerd.yml — Container runtime on all nodes
# WHY containerd: Kubernetes dropped Docker in v1.24. containerd is the
#   standard CRI-compatible runtime. We install from Docker's repo because
#   Ubuntu's bundled version is outdated.
- name: Install and configure containerd
  hosts: k8s_nodes
  become: true

  tasks:
    - name: Install prerequisites
      apt:
        name: [ca-certificates, curl, gnupg, lsb-release]
        state: present
        update_cache: true

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
          | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      apt_repository:
        repo: >
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install containerd.io 1.7.x
      # WHY pin to 1.7: containerd 2.x changed the CRI plugin config format.
      # Kubernetes 1.30 is validated against containerd 1.7.x.
      # containerd 2.x requires different config that kubeadm doesn't generate.
      apt:
        name: "containerd.io=1.7.*"
        state: present
        update_cache: true
        allow_downgrade: true

    - name: Remove existing containerd config (regenerate fresh)
      file:
        path: /etc/containerd/config.toml
        state: absent

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml

    - name: Set SystemdCgroup = true
      # WHY: Mismatched cgroup drivers (containerd uses cgroupfs, kubelet uses
      #   systemd) causes kubelet to crash. Both must use systemd.
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: Restart containerd

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started

    - name: Verify containerd is running
      command: ctr version
      register: ctr_out
      changed_when: false

    - name: Show containerd version
      debug:
        msg: "{{ ctr_out.stdout_lines }}"

  handlers:
    - name: Restart containerd
      systemd:
        name: containerd
        state: restarted
