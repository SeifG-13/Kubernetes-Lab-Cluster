---
# 01-common.yml — Kubernetes prerequisites on all nodes
# WHY: kubeadm requires swap off, bridge-nf-call, and ip_forward.
#      Without these, kubeadm pre-flight checks fail.
- name: Kubernetes node prerequisites
  hosts: k8s_nodes
  become: true

  tasks:
    - name: Disable swap (runtime)
      command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Disable swap (permanent — remove from fstab)
      replace:
        path: /etc/fstab
        regexp: '^([^#].*\bswap\b.*)$'
        replace: '# \1'

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay       # containerd uses overlay filesystem for image layers
        - br_netfilter  # makes iptables rules apply to bridged pod traffic

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter

    - name: Set sysctl parameters for Kubernetes networking
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_file: /etc/sysctl.d/k8s.conf
        reload: true
      loop:
        - { key: net.bridge.bridge-nf-call-iptables,  value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }
        - { key: net.ipv4.ip_forward,                 value: "1" }

    - name: Verify swap is off
      command: free -h
      register: mem_info
      changed_when: false

    - name: Show memory info
      debug:
        msg: "{{ mem_info.stdout_lines }}"
